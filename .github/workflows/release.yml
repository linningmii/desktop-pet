name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release-version:
    name: Validate Release Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          node - <<'NODE'
          const fs = require('fs');

          const tagName = process.env.GITHUB_REF_NAME || '';
          if (!tagName.startsWith('v')) {
            console.error(`Release tags must start with v, got "${tagName}".`);
            process.exit(1);
          }

          const tagVersion = tagName.slice(1);
          const checks = [];

          function readJson(file) {
            return JSON.parse(fs.readFileSync(file, 'utf8'));
          }

          function packageSection(toml, file) {
            const lines = toml.split(/\r?\n/);
            const section = [];
            let inPackage = false;

            for (const line of lines) {
              if (/^\s*\[/.test(line)) {
                if (/^\s*\[package\]\s*$/.test(line)) {
                  inPackage = true;
                  continue;
                }
                if (inPackage) break;
              }

              if (inPackage) section.push(line);
            }

            if (!inPackage) {
              throw new Error(`${file} is missing a [package] section.`);
            }
            return section.join('\n');
          }

          function tomlValue(section, key, file) {
            const match = section.match(new RegExp(`^\\s*${key}\\s*=\\s*"([^"]+)"`, 'm'));
            if (!match) {
              throw new Error(`${file} is missing package.${key}.`);
            }
            return match[1];
          }

          const packageJson = readJson('package.json');
          checks.push(['package.json version', packageJson.version]);

          const packageLock = readJson('package-lock.json');
          checks.push(['package-lock.json version', packageLock.version]);
          checks.push(['package-lock.json packages[""].version', packageLock.packages?.['']?.version]);

          const tauriConfig = readJson('src-tauri/tauri.conf.json');
          checks.push(['src-tauri/tauri.conf.json version', tauriConfig.version]);

          const cargoTomlFile = 'src-tauri/Cargo.toml';
          const cargoPackage = packageSection(fs.readFileSync(cargoTomlFile, 'utf8'), cargoTomlFile);
          const cargoName = tomlValue(cargoPackage, 'name', cargoTomlFile);
          const cargoVersion = tomlValue(cargoPackage, 'version', cargoTomlFile);
          checks.push(['src-tauri/Cargo.toml package.version', cargoVersion]);

          const cargoLockFile = 'src-tauri/Cargo.lock';
          const cargoLock = fs.readFileSync(cargoLockFile, 'utf8');
          const packageBlocks = cargoLock.split(/\n(?=\[\[package\]\]\n)/);
          const lockPackage = packageBlocks.find((block) => {
            const name = block.match(/^name\s*=\s*"([^"]+)"/m)?.[1];
            return name === cargoName;
          });
          if (!lockPackage) {
            throw new Error(`${cargoLockFile} is missing package "${cargoName}".`);
          }
          const lockVersion = lockPackage.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          checks.push([`src-tauri/Cargo.lock ${cargoName} version`, lockVersion]);

          const failures = checks.filter(([, version]) => version !== tagVersion);
          if (failures.length > 0) {
            console.error(`Release tag ${tagName} does not match project versions:`);
            for (const [label, version] of checks) {
              const marker = version === tagVersion ? 'OK' : 'MISMATCH';
              console.error(`- ${marker}: ${label} = ${version ?? '<missing>'}`);
            }
            process.exit(1);
          }

          console.log(`Release tag ${tagName} matches all project versions.`);
          for (const [label, version] of checks) {
            console.log(`- ${label}: ${version}`);
          }
          NODE

      - name: Skip release version validation
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "Release version validation only runs for v* tags."

  check:
    name: Check (${{ matrix.platform.name }})
    needs: validate-release-version
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-2025-vs2026
          - name: macOS
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

  build-windows-release:
    name: Build Windows Release Artifact
    needs: generate-release-notes
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2025-vs2026
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Create Windows self-signed signing certificate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject 'CN=Desktop Pet Self Signed' `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -KeyUsage DigitalSignature `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(1)

          $config = @{
            bundle = @{
              windows = @{
                digestAlgorithm = 'sha256'
                certificateThumbprint = $cert.Thumbprint
                timestampUrl = $null
              }
            }
          } | ConvertTo-Json -Depth 5

          Set-Content -Path src-tauri/tauri.windows.conf.json -Value $config -Encoding utf8
          Write-Host "Created self-signed Windows code signing certificate $($cert.Thumbprint)"

      - name: Build release bundles
        run: npm run tauri -- build --ci

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos-release:
    name: Build macOS Release Artifact
    needs: generate-release-notes
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Create macOS self-signed signing identity
        shell: bash
        run: |
          set -euo pipefail

          CERT_NAME="Desktop Pet Self Signed"
          KEYCHAIN_PATH="$RUNNER_TEMP/desktop-pet-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          P12_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          cat > "$RUNNER_TEMP/codesign.ext" <<'EOF'
          basicConstraints=critical,CA:false
          keyUsage=critical,digitalSignature
          extendedKeyUsage=codeSigning
          EOF

          openssl req \
            -new \
            -newkey rsa:2048 \
            -nodes \
            -keyout "$RUNNER_TEMP/codesign.key" \
            -out "$RUNNER_TEMP/codesign.csr" \
            -subj "/CN=$CERT_NAME"

          openssl x509 \
            -req \
            -days 365 \
            -in "$RUNNER_TEMP/codesign.csr" \
            -signkey "$RUNNER_TEMP/codesign.key" \
            -out "$RUNNER_TEMP/codesign.crt" \
            -extfile "$RUNNER_TEMP/codesign.ext"

          openssl pkcs12 \
            -export \
            -out "$RUNNER_TEMP/codesign.p12" \
            -inkey "$RUNNER_TEMP/codesign.key" \
            -in "$RUNNER_TEMP/codesign.crt" \
            -passout "pass:$P12_PASSWORD"

          security import "$RUNNER_TEMP/codesign.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          cat > src-tauri/tauri.macos.conf.json <<EOF
          {
            "app": {
              "macOSPrivateApi": true
            },
            "bundle": {
              "targets": ["app", "dmg"],
              "macOS": {
                "minimumSystemVersion": "10.15",
                "signingIdentity": "$CERT_NAME",
                "hardenedRuntime": false
              }
            }
          }
          EOF

      - name: Build release bundles
        run: npm run tauri -- build --ci

      - name: Package macOS .app bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "src-tauri/target/release/bundle/macos/Desktop Pet.app" \
            "src-tauri/target/release/bundle/macos/Desktop Pet_${VERSION}_macos.app.zip"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.zip

  generate-release-notes:
    name: Generate Release Notes
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      LLM_RELEASE_NOTES_FULL_INPUT_MAX_TOKENS: 128000
      LLM_RELEASE_NOTES_APPROX_CHARS_PER_TOKEN: 4
      LLM_RELEASE_NOTES_MAX_COMPLETION_TOKENS: 500
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate GitHub release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            > "$RUNNER_TEMP/github-generated-notes.json"

          node - <<'NODE'
          const fs = require('fs');
          const response = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/github-generated-notes.json', 'utf8'));
          const body = response.body?.trim() || 'No generated changelog entries.';
          fs.writeFileSync(process.env.RUNNER_TEMP + '/github-generated-notes.md', body + '\n');
          NODE

      - name: Generate Foundry release highlights
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT: https://linzhming27-9062-resource.openai.azure.com/openai/v1
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_OPENAI_API_KEY}" ]]; then
            echo "AZURE_OPENAI_API_KEY secret is required for release highlight generation." >&2
            exit 1
          fi

          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            git log \
              --format='commit %h%nTitle: %s%nDescription:%n%b%n---END---' \
              "$previous_tag..HEAD" > "$RUNNER_TEMP/release-commits-full.txt"
            git log \
              --format='commit %h%nTitle: %s%n---END---' \
              "$previous_tag..HEAD" > "$RUNNER_TEMP/release-commits-title-only.txt"
          else
            git log \
              -20 \
              --format='commit %h%nTitle: %s%nDescription:%n%b%n---END---' \
              HEAD > "$RUNNER_TEMP/release-commits-full.txt"
            git log \
              -20 \
              --format='commit %h%nTitle: %s%n---END---' \
              HEAD > "$RUNNER_TEMP/release-commits-title-only.txt"
          fi

          full_input_size_chars="$(wc -c < "$RUNNER_TEMP/release-commits-full.txt")"
          full_input_max_chars="$((LLM_RELEASE_NOTES_FULL_INPUT_MAX_TOKENS * LLM_RELEASE_NOTES_APPROX_CHARS_PER_TOKEN))"

          commit_input="$RUNNER_TEMP/release-commits-full.txt"
          if [[ "$full_input_size_chars" -gt "$full_input_max_chars" ]]; then
            echo "Full commit input is ${full_input_size_chars} chars, over the configured ${LLM_RELEASE_NOTES_FULL_INPUT_MAX_TOKENS} token budget; using title-only commits."
            commit_input="$RUNNER_TEMP/release-commits-title-only.txt"
          else
            echo "Full commit input is ${full_input_size_chars} chars, within the configured ${LLM_RELEASE_NOTES_FULL_INPUT_MAX_TOKENS} token budget."
          fi

          node - "$commit_input" "$RUNNER_TEMP/foundry-summary.json" <<'NODE'
          const fs = require('fs');
          const [inputPath, outputPath] = process.argv.slice(2);
          const commits = fs.readFileSync(inputPath, 'utf8').trim() || 'No commits found.';
          const payload = {
            model: 'gpt-5.4-mini',
            messages: [
              {
                role: 'system',
                content: [
                  'Write concise, user-facing release highlights for a desktop app.',
                  'Focus only on product-visible changes: features, platform support, runtime behavior, visual assets, packaging outputs, and user-facing bug fixes.',
                  'Do not mention project infrastructure, CI/CD, pipelines, GitHub Actions, internal refactors with no user-visible effect, dependency churn, or repository maintenance.',
                  'If a refactor has no feature change, include it only when it affects product behavior, stability, or platform compatibility.',
                  'Return Markdown with a "## Highlights" heading and 2-5 bullets. If there are no user-visible changes, say "No user-facing changes in this release."'
                ].join(' ')
              },
              {
                role: 'user',
                content: `Generate release highlights from these commits:\n\n${commits}`
              }
            ],
            max_completion_tokens: Number(process.env.LLM_RELEASE_NOTES_MAX_COMPLETION_TOKENS || 500)
          };
          fs.writeFileSync(outputPath, JSON.stringify(payload));
          NODE

          http_code="$(curl -sS \
            -o "$RUNNER_TEMP/foundry-summary-response.json" \
            -w "%{http_code}" \
            -H "api-key: $AZURE_OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -X POST \
            "$AZURE_OPENAI_ENDPOINT/chat/completions" \
            -d @"$RUNNER_TEMP/foundry-summary.json")"

          if [[ "$http_code" != "200" ]]; then
            echo "Microsoft Foundry release highlight generation failed with HTTP $http_code" >&2
            cat "$RUNNER_TEMP/foundry-summary-response.json" >&2
            exit 1
          fi

          node - <<'NODE'
          const fs = require('fs');
          const response = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/foundry-summary-response.json', 'utf8'));
          const content = response.choices?.[0]?.message?.content?.trim();
          if (!content || !content.includes('## Highlights')) {
            console.error('Unexpected Microsoft Foundry response:', JSON.stringify(response));
            process.exit(1);
          }
          fs.writeFileSync(process.env.RUNNER_TEMP + '/foundry-highlights.md', content + '\n');
          console.log(content);
          NODE

      - name: Combine release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            cat "$RUNNER_TEMP/foundry-highlights.md"
            echo
            echo "## Generated Changes"
            cat "$RUNNER_TEMP/github-generated-notes.md"
          } > release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v6
        with:
          name: generated-release-notes
          if-no-files-found: error
          path: release-notes.md

  release:
    name: Publish GitHub Release
    needs:
      - generate-release-notes
      - build-windows-release
      - build-macos-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v6
        with:
          name: generated-release-notes
          path: .

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_FLAGS=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          mapfile -d '' RELEASE_ASSETS < <(find release-assets -type f -print0 | sort -z)
          if [[ "${#RELEASE_ASSETS[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi

          printf 'Release assets:\n'
          printf ' - %s\n' "${RELEASE_ASSETS[@]}"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Desktop Pet ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
            gh release upload "${GITHUB_REF_NAME}" "${RELEASE_ASSETS[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${RELEASE_ASSETS[@]}" \
              --title "Desktop Pet ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              "${RELEASE_FLAGS[@]}"
          fi
