name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  check:
    name: Check (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-2025-vs2026
          - name: macOS
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Test GitHub Models API
        if: matrix.platform.name == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/github-models-smoke-test.json" <<'EOF'
          {
            "model": "openai/gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": "Reply with exactly: ok"
              },
              {
                "role": "user",
                "content": "Smoke test"
              }
            ],
            "temperature": 0,
            "max_tokens": 4
          }
          EOF

          http_code="$(curl -sS \
            -o "$RUNNER_TEMP/github-models-smoke-test-response.json" \
            -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            https://models.github.ai/inference/chat/completions \
            -d @"$RUNNER_TEMP/github-models-smoke-test.json")"

          if [[ "$http_code" != "200" ]]; then
            echo "GitHub Models API smoke test failed with HTTP $http_code" >&2
            cat "$RUNNER_TEMP/github-models-smoke-test-response.json" >&2
            exit 1
          fi

          node - <<'NODE'
          const fs = require('fs');
          const response = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/github-models-smoke-test-response.json', 'utf8'));
          const content = response.choices?.[0]?.message?.content?.trim().toLowerCase();
          if (content !== 'ok') {
            console.error('Unexpected GitHub Models API response:', JSON.stringify(response));
            process.exit(1);
          }
          console.log('GitHub Models API smoke test passed.');
          NODE

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"

          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version v${TAG_VERSION} does not match tauri.conf.json version ${APP_VERSION}." >&2
            exit 1
          fi

      - name: Check
        run: npm run check

  build-windows-release:
    name: Build Windows Release Artifact
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2025-vs2026
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Create Windows self-signed signing certificate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject 'CN=Desktop Pet Self Signed' `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -KeyUsage DigitalSignature `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(1)

          $config = @{
            bundle = @{
              windows = @{
                digestAlgorithm = 'sha256'
                certificateThumbprint = $cert.Thumbprint
                timestampUrl = $null
              }
            }
          } | ConvertTo-Json -Depth 5

          Set-Content -Path src-tauri/tauri.windows.conf.json -Value $config -Encoding utf8
          Write-Host "Created self-signed Windows code signing certificate $($cert.Thumbprint)"

      - name: Build release bundles
        run: npm run tauri -- build --ci

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos-release:
    name: Build macOS Release Artifact
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Create macOS self-signed signing identity
        shell: bash
        run: |
          set -euo pipefail

          CERT_NAME="Desktop Pet Self Signed"
          KEYCHAIN_PATH="$RUNNER_TEMP/desktop-pet-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          cat > "$RUNNER_TEMP/codesign.ext" <<'EOF'
          basicConstraints=critical,CA:false
          keyUsage=critical,digitalSignature
          extendedKeyUsage=codeSigning
          EOF

          openssl req \
            -new \
            -newkey rsa:2048 \
            -nodes \
            -keyout "$RUNNER_TEMP/codesign.key" \
            -out "$RUNNER_TEMP/codesign.csr" \
            -subj "/CN=$CERT_NAME"

          openssl x509 \
            -req \
            -days 365 \
            -in "$RUNNER_TEMP/codesign.csr" \
            -signkey "$RUNNER_TEMP/codesign.key" \
            -out "$RUNNER_TEMP/codesign.crt" \
            -extfile "$RUNNER_TEMP/codesign.ext"

          openssl pkcs12 \
            -export \
            -out "$RUNNER_TEMP/codesign.p12" \
            -inkey "$RUNNER_TEMP/codesign.key" \
            -in "$RUNNER_TEMP/codesign.crt" \
            -passout pass:

          security import "$RUNNER_TEMP/codesign.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security add-trusted-cert \
            -r trustRoot \
            -k "$KEYCHAIN_PATH" \
            "$RUNNER_TEMP/codesign.crt"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          cat > src-tauri/tauri.macos.conf.json <<EOF
          {
            "app": {
              "macOSPrivateApi": true
            },
            "bundle": {
              "targets": ["app", "dmg"],
              "macOS": {
                "minimumSystemVersion": "10.15",
                "signingIdentity": "$CERT_NAME",
                "hardenedRuntime": false
              }
            }
          }
          EOF

      - name: Build release bundles
        run: npm run tauri -- build --ci

      - name: Package macOS .app bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "src-tauri/target/release/bundle/macos/Desktop Pet.app" \
            "src-tauri/target/release/bundle/macos/Desktop Pet_${VERSION}_macos.app.zip"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.zip

  release:
    name: Publish GitHub Release
    needs:
      - build-windows-release
      - build-macos-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_FLAGS=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              release-assets/* \
              --title "Desktop Pet ${GITHUB_REF_NAME}" \
              --generate-notes \
              --notes "Windows and macOS builds for Desktop Pet ${GITHUB_REF_NAME}." \
              "${RELEASE_FLAGS[@]}"
          fi
